version: '3.8'

services:
  buddi:
    build: .
    container_name: buddi_clinical_agent
    env_file: .env
    ports:
      - "8000:8000"  # Backend API
      - "3000:3000"  # Frontend Dashboard
    volumes:
      - ./:/app:delegated
      - audit_data:/app/data
    restart: unless-stopped

volumes:
  audit_data:
