# Buddi — local/staging compose.
#
# Track 1 / Step 1 (ARCH-01, CFG-01, DO-01): canonical surface is backend.api:app
# on port 8001. The following items are deliberately left for later tracks and
# are flagged inline to avoid silent regression:
#   - DO-05: Remove the `.:/app` bind-mount (Track 2 Step 11).
#   - CFG-04: Parameterize DEV_MODE (Track 3).
#   - Track 2 Step 10 will introduce the Redis service for distributed rate
#     limiting; the stub is left commented for that step.
version: "3.8"

services:
  api:
    build: .
    image: buddi-api:local
    ports:
      - "8001:8001"
    volumes:
      # TODO(Track 2 Step 11 / DO-05): remove this bind-mount.
      - .:/app
    env_file:
      - .env
    environment:
      # TODO(Track 3 / CFG-04): DEV_MODE=${DEV_MODE:-false}
      - DEV_MODE=true
      - PORT=8001
      - PYTHONPATH=/app
    # `--reload` is dev-only; see start_dev.py for the local dev loop. The
    # compose command mirrors the Dockerfile CMD so `docker compose up` runs
    # the canonical production-parity process.
    command: >
      uvicorn backend.api:app
      --host 0.0.0.0
      --port 8001
      --proxy-headers
      --forwarded-allow-ips=*

  # TODO(Track 2 Step 10 / SEC-07): Redis for slowapi distributed rate limiting.
  # redis:
