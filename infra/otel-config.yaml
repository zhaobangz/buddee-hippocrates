# Local dev OTel collector config.
# In production, Cloud Run exports directly to Cloud Trace via OTLP.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  resource:
    attributes:
      - action: insert
        key: deployment.environment
        value: local

exporters:
  logging:
    verbosity: normal
  # Uncomment for production:
  # googlecloud:
  #   project: ${GCP_PROJECT_ID}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [logging]
