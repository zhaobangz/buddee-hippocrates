# Buddi API — Cloud Run service (Tier 2, PHI‑capable).
#
# Apply after provisioning (infra/provision_gcp.sh) and filling
# infra/env.tier2. Substitute env vars before applying:
#   PROJECT_ID  — GCP project ID
#   REGION      — GCP region (e.g. us-central1)
#   IMAGE_TAG   — Container image tag (e.g. prod-abc123)
#
# Deploy with:
#   gcloud run services replace infra/cloud-run-api.yaml --region=$REGION
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: buddi-api
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/vpc-access-connector: projects/PROJECT_ID/locations/REGION/connectors/buddi-vpc
        run.googleapis.com/vpc-access-egress: private-ranges-only
        # Inject secrets as files mounted under /secrets/.
        run.googleapis.com/secrets: |
          buddi-database-url=/secrets/database-url:latest
          buddi-secret-key=/secrets/secret-key:latest
          buddi-storage-key=/secrets/storage-key:latest
          buddi-api-key=/secrets/api-key:latest
          buddi-anthropic-key=/secrets/anthropic-key:latest
          buddi-redis-url=/secrets/redis-url:latest
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      serviceAccountName: buddi-api@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/buddi/buddi-api:IMAGE_TAG
          ports:
            - containerPort: 8001
          resources:
            limits:
              cpu: "2"
              memory: "4Gi"
          env:
            - name: ENVIRONMENT
              value: production
            - name: PORT
              value: "8001"
            - name: BUDDI_DISABLE_WORKER
              value: "0"
            - name: BUDDI_DISABLE_MERKLE_TASK
              value: "0"
            - name: BUDDI_BAA_CONFIRMED
              value: "0"   # ⛔  Flip to "1" ONLY after counsel confirms BAAs.
            - name: LLM_PROVIDER
              value: anthropic
            # Secrets are mounted as files by the annotation above. At boot,
            # core/secrets_loader.py maps them into the environment:
            #   database-url→DATABASE_URL  secret-key→SECRET_KEY
            #   storage-key→BUDDI_STORAGE_KEY  api-key→API_KEY
            #   anthropic-key→ANTHROPIC_API_KEY  redis-url→REDIS_URL
            # (QW-5) REDIS_URL feeds the rate limiter — point the
            # buddi-redis-url secret at Memorystore (redis://<ip>:6379/0).
            # ⛔ BUDDI_TEST_MODE must never be set here: the app refuses to
            # boot with it on Cloud Run (C-3).
            - name: SECRETS_DIR
              value: /secrets
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 15
