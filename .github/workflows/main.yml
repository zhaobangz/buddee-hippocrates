name: Buddi Backend Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Track 1 / Step 1: make the canonical frontend API base visible to any job
# that later builds the Vite bundle. Real values still come from GitHub
# Environments / Secrets; this placeholder is safe to commit.
env:
  VITE_API_BASE: http://localhost:8001/api

jobs:
  test:
    runs-on: ubuntu-latest

    # Provision Postgres+pgvector for the run. The pgvector image is the same
    # one our README documents for local dev, so CI matches developer reality.
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: buddi
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Track 1 / Step 1 (ARCH-01, TEST-02, CQ-02): lint the canonical code
      # paths. The legacy `app/` tree has been deleted (Track 2 Step 11) so
      # this list is now the full set of first-party Python surfaces.
      - name: Lint with ruff
        run: ruff check backend/ core/ tools/ scripts/

      - name: Wait for Postgres + enable pgvector
        env:
          PGPASSWORD: postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5433 -U postgres; then break; fi
            sleep 1
          done
          psql -h localhost -p 5433 -U postgres -d buddi \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run alembic migrations
        env:
          BUDDI_TEST_MODE: "1"
          SECRET_KEY: "ci-test-secret-key-0123456789abcdef0123456789abcdef"
          BUDDI_STORAGE_KEY: "ci-test-storage-key-not-for-prod"
          API_KEY: "ci-test-api-key-abcdef1234567890"
          CORS_ORIGINS: "http://localhost:5173"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/buddi"
        run: alembic upgrade head

      - name: Test with pytest
        # TEST-01 (April-21 verification): the tests/ directory now exists
        # and contains the integration + audit-chain tests. We run pytest
        # unconditionally and fail the build on any failure.
        env:
          BUDDI_TEST_MODE: "1"
          BUDDI_RATE_LIMIT_DISABLED: "1"
          SECRET_KEY: "ci-test-secret-key-0123456789abcdef0123456789abcdef"
          BUDDI_STORAGE_KEY: "ci-test-storage-key-not-for-prod"
          API_KEY: "ci-test-api-key-abcdef1234567890"
          CORS_ORIGINS: "http://localhost:5173"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/buddi"
        run: pytest -q

      # Manual §2.2 week 3 deliverable: eval harness with CI regression
      # gate. Runs in offline mode (no LLM calls, no PHI risk) against
      # the 10-case clinician-labeled seed set in evals/golden/. Fails
      # the build on precision/recall regression > 5% or any
      # must_abstain_codes violation.
      - name: Eval regression gate
        env:
          BUDDI_TEST_MODE: "1"
          BUDDI_RATE_LIMIT_DISABLED: "1"
          BUDDI_DISABLE_MERKLE_TASK: "1"
          SECRET_KEY: "ci-test-secret-key-0123456789abcdef0123456789abcdef"
          BUDDI_STORAGE_KEY: "ci-test-storage-key-not-for-prod"
          API_KEY: "ci-test-api-key-abcdef1234567890"
          CORS_ORIGINS: "http://localhost:5173"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/buddi"
        run: python -m evals.run_eval --offline --cases evals/golden --baseline evals/baseline.json

      # Verify the Synthea generator stays in sync with the bundles
      # shipped under evals/synthea/bundles/ — catches drift where the
      # CASES table is edited but the on-disk bundles aren't refreshed.
      - name: Synthea generator smoke test
        env:
          BUDDI_TEST_MODE: "1"
        run: |
          python -m evals.synthea.generate --out /tmp/buddi-synthea-check
          test "$(ls /tmp/buddi-synthea-check/*.json | wc -l)" -ge 25

  frontend:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test --silent
      - name: Build production bundle
        env:
          VITE_API_BASE: http://localhost:8001/api
        run: npm run build

  deploy-staging:
    needs: [test, frontend]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Cloud Run (Staging) — placeholder
        # Real deploy wiring arrives in Track 3 Step 21 (DO-04). Leaving an
        # explicit non-zero-on-misuse marker so nobody mistakes this for a
        # working pipeline.
        run: |
          echo "::warning::Staging deploy not yet implemented (Track 3 Step 21 / DO-04)."

  deploy-production:
    needs: [test, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Cloud Run (Production) — placeholder
        run: |
          echo "::warning::Production deploy not yet implemented (Track 3 Step 21 / DO-04)."
